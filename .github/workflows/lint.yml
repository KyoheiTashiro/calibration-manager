# なぜ: lint失敗がデプロイをブロックしないよう、独立したワークフローとして分離する
# （docs/architecture/tech-stack.md「CI構成の方針」）。
name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint:typed
