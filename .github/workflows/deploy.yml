# なぜ: docs/infra/deploy.md の設計値をそのまま実装する。
# build/deployをジョブ分離することで、ビルド失敗とデプロイ失敗の原因を切り分けやすくする。
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# なぜ: 同一ブランチへの連続pushで発生する重複デプロイを自動キャンセルし、
# 常に最新コミットのみがデプロイされるようにする。
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-slim
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
