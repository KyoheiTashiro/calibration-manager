# なぜ: lint失敗がテスト・ビルド確認をブロックしないよう、
# testワークフローをlintワークフローと独立させる（docs/architecture/tech-stack.md「CI構成の方針」）。
name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run build
